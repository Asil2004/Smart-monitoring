<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCore Pro | Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00d2ff;
            --danger: #ff4b2b;
            --success: #00ff88;
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.06);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: radial-gradient(circle at top right, #1a2236, #0b0e14);
            min-height: 100vh;
        }

        .navbar {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }

        .status-pill {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .online { color: var(--success); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        .offline { color: var(--danger); box-shadow: 0 0 10px rgba(255, 75, 43, 0.2); }

        .container { padding: 25px; max-width: 1200px; margin: auto; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
        }

        .card:hover { border-color: var(--primary); transform: translateY(-3px); }

        .card i { font-size: 1.5rem; color: var(--primary); margin-bottom: 10px; }
        .label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; }
        .value { font-size: 2.2rem; font-weight: 800; margin: 10px 0; }
        .unit { font-size: 0.9rem; color: #64748b; }

        .chart-box {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .danger-blink {
            animation: blinker 1s linear infinite;
            border-color: var(--danger) !important;
        }

        @keyframes blinker {
            50% { opacity: 0.5; background: rgba(255, 75, 43, 0.1); }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="font-size: 1.3rem; font-weight: 900; letter-spacing: 1px;">
        <i class="fa-solid fa-microchip" style="color: var(--primary);"></i> SMARTCORE PRO
    </div>
    <div id="status-container" class="status-pill offline">
        <i class="fa-solid fa-circle" id="status-icon"></i> <span id="status-text">TIZIM OFLAYN</span>
    </div>
</nav>

<div class="container">
    <div class="grid">
        <div class="card">
            <i class="fa-solid fa-temperature-three-quarters"></i>
            <div class="label">Harorat</div>
            <div class="value" id="temp">--</div><span class="unit">°C</span>
        </div>
        <div class="card">
            <i class="fa-solid fa-droplet"></i>
            <div class="label">Namlik</div>
            <div class="value" id="hum">--</div><span class="unit">%</span>
        </div>
        <div class="card" id="mq135-card">
            <i class="fa-solid fa-smog"></i>
            <div class="label">MQ-135 (Havo)</div>
            <div class="value" id="mq135">--</div><span class="unit">ppm</span>
        </div>
        <div class="card" id="mq9-card">
            <i class="fa-solid fa-biohazard"></i>
            <div class="label">MQ-9 (Gaz/CO)</div>
            <div class="value" id="mq9">--</div><span class="unit">ppm</span>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="iotChart" height="100"></canvas>
    </div>
</div>

<script>
    // 1. FIREBASE KONFIGURATSIYASI (Sizning ma'lumotlaringiz)
    const firebaseConfig = {
        apiKey: "AIzaSyArkLOSoR0Wmsc6sZZFd_ptsbL_VPCvmI8",
        authDomain: "smart-monitoring-82bd2.firebaseapp.com",
        databaseURL: "https://smart-monitoring-82bd2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "smart-monitoring-82bd2",
        storageBucket: "smart-monitoring-82bd2.firebasestorage.app",
        messagingSenderId: "503146150887",
        appId: "1:503146150887:web:1dc339149f42a9185d9b42"
    };

    // Firebase-ni ishga tushirish
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. CHART.JS SOZLAMALARI
    const ctx = document.getElementById('iotChart').getContext('2d');
    const iotChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'MQ-135', data: [], borderColor: '#00d2ff', tension: 0.4, fill: false },
                { label: 'MQ-9', data: [], borderColor: '#ff4b2b', tension: 0.4, fill: false }
            ]
        },
        options: {
            responsive: true,
            scales: {
                x: { grid: { display: false }, ticks: { color: '#64748b' } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
            },
            plugins: { legend: { labels: { color: '#fff' } } }
        }
    });

    // 3. MA'LUMOTLARNI REAL VAQTDA QABUL QILISH
    db.ref('sensors').on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        // Qiymatlarni yangilash
        document.getElementById('temp').innerText = data.temperature || 0;
        document.getElementById('hum').innerText = data.humidity || 0;
        document.getElementById('mq135').innerText = data.mq135 || 0;
        document.getElementById('mq9').innerText = data.mq9 || 0;

        // Xavfni tekshirish
        if(data.mq9 > 800) document.getElementById('mq9-card').classList.add('danger-blink');
        else document.getElementById('mq9-card').classList.remove('danger-blink');

        if(data.mq135 > 1200) document.getElementById('mq135-card').classList.add('danger-blink');
        else document.getElementById('mq135-card').classList.remove('danger-blink');

        // Grafikni yangilash
        const now = new Date().toLocaleTimeString();
        if(iotChart.data.labels.length > 15) {
            iotChart.data.labels.shift();
            iotChart.data.datasets[0].data.shift();
            iotChart.data.datasets[1].data.shift();
        }
        iotChart.data.labels.push(now);
        iotChart.data.datasets[0].data.push(data.mq135);
        iotChart.data.datasets[1].data.push(data.mq9);
        iotChart.update();
    });

    // 4. ONLAYN/OFLAYN STATUSINI TEKSHIRISH
    db.ref('last_seen').on('value', (snapshot) => {
        const lastSeen = snapshot.val();
        const statusCont = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');

        function checkStatus() {
            const now = Date.now();
            if (now - lastSeen > 20000) { // 20 soniya kutish
                statusCont.className = "status-pill offline";
                statusText.innerText = "TIZIM OFLAYN";
            } else {
                statusCont.className = "status-pill online";
                statusText.innerText = "TIZIM ONLAYN";
            }
        }
        setInterval(checkStatus, 5000);
    });
</script>

</body>
</html>
