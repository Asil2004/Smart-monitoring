<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCore Pro | IoT Monitoring</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00d2ff;
            --danger: #ff4b2b;
            --success: #00ff88;
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background: radial-gradient(circle at top right, #1a1f2c, #0b0e14);
            min-height: 100vh;
        }

        /* Navigatsiya */
        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .status-box {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .pulse {
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 10px;
            transition: 0.5s;
        }

        .online-pulse { background: var(--success); box-shadow: 0 0 12px var(--success); }
        .offline-pulse { background: var(--danger); box-shadow: 0 0 12px var(--danger); }

        /* Konteyner */
        .container { padding: 30px; max-width: 1300px; margin: auto; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Kartalar */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 22px;
            transition: 0.3s;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .card i { font-size: 1.4rem; color: var(--primary); margin-bottom: 12px; }
        .label { color: #888; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .value { font-size: 2.4rem; font-weight: 700; margin: 8px 0; }
        .unit { font-size: 0.9rem; color: #666; margin-left: 4px; }

        .gas-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            margin-top: 5px;
        }

        /* Grafik */
        .chart-container {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Alert Overlay */
        .danger-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 75, 43, 0.15);
            pointer-events: none;
            display: none;
            z-index: 1000;
            animation: pulse-alert 1s infinite alternate;
        }

        @keyframes pulse-alert {
            from { opacity: 0; } to { opacity: 1; }
        }

        .danger-card { border-color: var(--danger) !important; animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-2px);} 75% {transform: translateX(2px);} }
    </style>
</head>
<body>

<div class="danger-overlay" id="alert-bg"></div>

<nav class="navbar">
    <div style="font-size: 1.4rem; font-weight: 800;">
        <i class="fa-solid fa-bolt-lightning" style="color: var(--primary);"></i> SMART<span style="color: var(--primary);">CORE</span>
    </div>
    <div class="status-box">
        <div id="status-dot" class="pulse offline-pulse"></div>
        <span id="status-text">TIZIM: OFLAYN</span>
    </div>
</nav>

<div class="container">
    <div class="stats-grid">
        <div class="card">
            <i class="fa-solid fa-thermometer"></i>
            <div class="label">Harorat</div>
            <div class="value" id="val-t">--<span class="unit">°C</span></div>
        </div>

        <div class="card">
            <i class="fa-solid fa-droplet-slash"></i>
            <div class="label">Namlik</div>
            <div class="value" id="val-h">--<span class="unit">%</span></div>
        </div>

        <div class="card" id="card-mq135">
            <i class="fa-solid fa-mask-ventilator"></i>
            <div class="label">MQ-135 Havo Sifati</div>
            <div class="value" id="val-m135">--<span class="unit">ppm</span></div>
            <div class="gas-badge" id="txt-m135">Tahlil qilinmoqda...</div>
        </div>

        <div class="card" id="card-mq9">
            <i class="fa-solid fa-fire-burner"></i>
            <div class="label">MQ-9 Yonuvchi/CO</div>
            <div class="value" id="val-m9">--<span class="unit">ppm</span></div>
            <div class="gas-badge" id="txt-m9">Tahlil qilinmoqda...</div>
        </div>

        <div class="card" id="card-dist">
            <i class="fa-solid fa-ruler-combined"></i>
            <div class="label">Lazer Masofa</div>
            <div class="value" id="val-d">--<span class="unit">mm</span></div>
        </div>

        <div class="card">
            <i class="fa-solid fa-sun"></i>
            <div class="label">Yorug'lik</div>
            <div class="value" id="val-l">--<span class="unit">lx</span></div>
        </div>
    </div>

    <div class="chart-container">
        <h3 style="margin: 0 0 20px 0; font-size: 1rem; color: #888;">
            <i class="fa-solid fa-chart-area"></i> GAZ DATCHIKLARI DINAMIKASI
        </h3>
        <canvas id="liveChart" height="90"></canvas>
    </div>
</div>

<script>
    // FIREBASE SOZLAMALARI
    const firebaseConfig = {
        apiKey: "AIzaSyArkLOSoR0Wmsc6sZZFd_ptsbL_VPCvmI8",
        databaseURL: "https://smart-monitoring-82bd2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "smart-monitoring-82bd2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // CHART.JS SOZLAMALARI
    const ctx = document.getElementById('liveChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'MQ-135', data: [], borderColor: '#00d2ff', backgroundColor: 'rgba(0,210,255,0.05)', fill: true, tension: 0.4 },
                { label: 'MQ-9', data: [], borderColor: '#ff4b2b', backgroundColor: 'rgba(255,75,43,0.05)', fill: true, tension: 0.4 }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666' } },
                x: { grid: { display: false }, ticks: { color: '#666' } }
            },
            plugins: { legend: { labels: { color: '#fff', font: { size: 12 } } } }
        }
    });

    // MA'LUMOTLARNI REAL VAQTDA QABUL QILISH
    db.ref('sensors').on('value', (snap) => {
        const data = snap.val();
        if(!data) return;

        // UI yangilash
        document.getElementById('val-t').innerHTML = `${data.temperature}<span class="unit">°C</span>`;
        document.getElementById('val-h').innerHTML = `${data.humidity}<span class="unit">%</span>`;
        document.getElementById('val-m135').innerHTML = `${data.mq135}<span class="unit">ppm</span>`;
        document.getElementById('val-m9').innerHTML = `${data.mq9}<span class="unit">ppm</span>`;
        document.getElementById('val-d').innerHTML = `${data.distance}<span class="unit">mm</span>`;
        document.getElementById('val-l').innerHTML = `${data.lux}<span class="unit">lx</span>`;

        // Gaz nomlari va mantiqi
        let m135Text = "Havoda xavf yo'q";
        if(data.mq135 > 1200) m135Text = "⚠️ ZAHARLI: AMMIAK/BENZOL!";
        else if(data.mq135 > 800) m135Text = "Kirlangan havo";
        document.getElementById('txt-m135').innerText = m135Text;

        let m9Text = "Gaz sızıntısı yo'q";
        if(data.mq9 > 800) m9Text = "🔥 XAVF: IS GAZI / METAN!";
        else if(data.mq9 > 500) m9Text = "Gaz darajasi yuqori";
        document.getElementById('txt-m9').innerText = m9Text;

        // Danger Mode
        const danger = (data.distance < 200 || data.mq9 > 800 || data.mq135 > 1200);
        document.getElementById('alert-bg').style.display = danger ? 'block' : 'none';
        
        // Kartalarni qizartirish
        document.getElementById('card-dist').className = (data.distance < 200) ? 'card danger-card' : 'card';
        document.getElementById('card-mq9').className = (data.mq9 > 800) ? 'card danger-card' : 'card';
        document.getElementById('card-mq135').className = (data.mq135 > 1200) ? 'card danger-card' : 'card';

        // Chart update
        const now = new Date().toLocaleTimeString();
        if(chart.data.labels.length > 20) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
            chart.data.datasets[1].data.shift();
        }
        chart.data.labels.push(now);
        chart.data.datasets[0].data.push(data.mq135);
        chart.data.datasets[1].data.push(data.mq9);
        chart.update();
    });

    // ONLINE/OFFLINE STATUS TEKSHIRISH
    db.ref('last_seen').on('value', (snap) => {
        const lastSeen = snap.val();
        setInterval(() => {
            const now = Date.now();
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            
            if (now - lastSeen > 15000) { // 15 soniya javob bo'lmasa
                dot.className = "pulse offline-pulse";
                txt.innerText = "TIZIM: OFLAYN";
            } else {
                dot.className = "pulse online-pulse";
                txt.innerText = "TIZIM: ONLAYN";
            }
        }, 1000);
    });
</script>

</body>
</html>
