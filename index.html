<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCore Pro | Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00d2ff;
            --danger: #ff4b2b;
            --warning: #f1c40f;
            --success: #00ff88;
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.06);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: radial-gradient(circle at top right, #1a2236, #0b0e14);
            min-height: 100vh;
        }

        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
        }

        .status-pill {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .online { color: var(--success); border-color: var(--success); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .offline { color: var(--danger); border-color: var(--danger); box-shadow: 0 0 10px rgba(255,75,43,0.2); }

        .container { padding: 30px; max-width: 1200px; margin: auto; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .card i { font-size: 2rem; color: var(--primary); margin-bottom: 15px; }
        .label { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 2.8rem; font-weight: 800; margin: 10px 0; display: inline-block; }
        .unit { font-size: 1rem; color: #64748b; margin-left: 5px; }

        .badge {
            display: block;
            margin-top: 15px;
            padding: 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
        }

        /* Alert Animations */
        .danger-alert {
            animation: pulse-red 0.8s infinite alternate;
            border-color: var(--danger) !important;
        }
        @keyframes pulse-red {
            from { box-shadow: 0 0 5px var(--danger); }
            to { box-shadow: 0 0 20px var(--danger); background: rgba(255, 75, 43, 0.1); }
        }

        .warning-alert { color: var(--warning); }
        .success-alert { color: var(--success); }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="font-size: 1.5rem; font-weight: 900;">
        <i class="fa-solid fa-shield-halved" style="color: var(--primary);"></i> SMARTCORE <span style="color:var(--primary)">PRO</span>
    </div>
    <div id="status-box" class="status-pill offline">
        <i class="fa-solid fa-circle"></i> <span id="status-text">TIZIM OFLAYN</span>
    </div>
</nav>

<div class="container">
    <div class="grid">
        <div class="card">
            <i class="fa-solid fa-temperature-half"></i>
            <div class="label">Harorat / Namlik</div>
            <div>
                <span class="value" id="temp">--</span><span class="unit">°C</span>
                <span style="margin: 0 15px; color: #333;">|</span>
                <span class="value" id="hum">--</span><span class="unit">%</span>
            </div>
        </div>

        <div class="card" id="lux-card">
            <i class="fa-solid fa-lightbulb"></i>
            <div class="label">Yorug'lik Darajasi</div>
            <div class="value" id="lux">--</div><span class="unit">%</span>
            <div class="badge" id="lux-desc">Aniqlanmoqda...</div>
        </div>

        <div class="card" id="mq135-card">
            <i class="fa-solid fa-wind"></i>
            <div class="label">Havo Sifati (MQ-135)</div>
            <div class="value" id="mq135">--</div><span class="unit">ppm</span>
            <div class="badge" id="mq135-desc">Tahlil qilinmoqda...</div>
        </div>

        <div class="card" id="mq9-card">
            <i class="fa-solid fa-gas-pump"></i>
            <div class="label">Yonuvchi Gazlar (MQ-9)</div>
            <div class="value" id="mq9">--</div><span class="unit">ppm</span>
            <div class="badge" id="mq9-desc">Tahlil qilinmoqda...</div>
        </div>
    </div>
</div>

<script>
    // 1. FIREBASE SOZLAMALARI
    const firebaseConfig = {
        apiKey: "AIzaSyArkLOSoR0Wmsc6sZZFd_ptsbL_VPCvmI8",
        databaseURL: "https://smart-monitoring-82bd2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "smart-monitoring-82bd2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. REAL-TIME MONITORING
    db.ref('sensors').on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        // Harorat va Namlik
        document.getElementById('temp').innerText = data.temperature;
        document.getElementById('hum').innerText = data.humidity;

        // Yorug'lik tahlili
        const luxVal = data.lux;
        document.getElementById('lux').innerText = luxVal;
        let luxText = "";
        if(luxVal < 20) luxText = "🌑 Tun (Qorong'u)";
        else if(luxVal < 60) luxText = "☁️ Xira (Bulutli / Xona)";
        else luxText = "☀️ Kunduz (Yorug')";
        document.getElementById('lux-desc').innerText = luxText;

        // MQ-135 Havo Sifati Tahlili
        const m135 = data.mq135;
        document.getElementById('mq135').innerText = m135;
        let m135Desc = "✅ Havo toza";
        const mq135Card = document.getElementById('mq135-card');
        
        if(m135 > 1200) {
            m135Desc = "🚨 XAVF: Ammiak / Benzol!";
            mq135Card.classList.add('danger-alert');
        } else if(m135 > 600) {
            m135Desc = "⚠️ Kirlangan: Karbonat angidrid";
            mq135Card.classList.remove('danger-alert');
        } else {
            mq135Card.classList.remove('danger-alert');
        }
        document.getElementById('mq135-desc').innerText = m135Desc;

        // MQ-9 Yonuvchi Gaz Tahlili
        const m9 = data.mq9;
        document.getElementById('mq9').innerText = m9;
        let m9Desc = "✅ Gaz sızıntısı yo'q";
        const mq9Card = document.getElementById('mq9-card');

        if(m9 > 1000) {
            m9Desc = "🚨 XAVF: METAN / PROPAN!";
            mq9Card.classList.add('danger-alert');
        } else if(m9 > 500) {
            m9Desc = "⚠️ Diqqat: Is gazi (CO) sezildi";
            mq9Card.classList.remove('danger-alert');
        } else {
            mq9Card.classList.remove('danger-alert');
        }
        document.getElementById('mq9-desc').innerText = m9Desc;
    });

    // 3. STATUS TEKSHIRISH (Online/Offline)
    db.ref('last_seen').on('value', (snap) => {
        const lastSeen = snap.val();
        const statusBox = document.getElementById('status-box');
        const statusText = document.getElementById('status-text');

        function updateStatus() {
            const now = Date.now();
            if (now - lastSeen > 30000) {
                statusBox.className = "status-pill offline";
                statusText.innerText = "TIZIM OFLAYN";
            } else {
                statusBox.className = "status-pill online";
                statusText.innerText = "TIZIM ONLAYN";
            }
        }
        setInterval(updateStatus, 5000);
    });
</script>

</body>
</html>
