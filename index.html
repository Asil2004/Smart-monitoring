<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>SmartCore Pro Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00d2ff; --d: #ff4b2b; --s: #00ff88; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; backdrop-filter: blur(10px); }
        .card i { font-size: 2rem; color: var(--p); margin-bottom: 15px; }
        .val { font-size: 2.5rem; font-weight: 800; color: var(--p); }
        .status { padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .online { background: rgba(0,255,136,0.1); color: var(--s); border: 1px solid var(--s); }
        .offline { background: rgba(255,75,43,0.1); color: var(--d); border: 1px solid var(--d); }
        .chart-box { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-top: 30px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-size: 1.5rem; font-weight: bold;"><i class="fa-solid fa-microchip"></i> SMARTCORE <span style="color:var(--p)">PRO</span></div>
    <div id="stat" class="status offline">TIZIM: OFLAYN</div>
</div>

<div class="grid">
    <div class="card"><i class="fa-solid fa-temperature-high"></i><div>HARORAT</div><div class="val" id="t">--</div><span>°C</span></div>
    <div class="card"><i class="fa-solid fa-droplet"></i><div>NAMLYIK</div><div class="val" id="h">--</div><span>%</span></div>
    <div class="card"><i class="fa-solid fa-wind"></i><div>HAVO SIFATI</div><div class="val" id="m1">--</div><span>PPM</span></div>
    <div class="card"><i class="fa-solid fa-gas-pump"></i><div>MQ-9 GAZ</div><div class="val" id="m9">--</div><span>PPM</span></div>
</div>

<div class="chart-box"><canvas id="myChart" height="100"></canvas></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyArkLOSoR0Wmsc6sZZFd_ptsbL_VPCvmI8",
        databaseURL: "https://smart-monitoring-82bd2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "smart-monitoring-82bd2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ctx = document.getElementById('myChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'MQ-135', data: [], borderColor: '#00d2ff' }, { label: 'MQ-9', data: [], borderColor: '#ff4b2b' }] },
        options: { plugins: { legend: { labels: { color: '#fff' } } } }
    });

    db.ref('sensors').on('value', (s) => {
        const d = s.val();
        if(!d) return;
        document.getElementById('t').innerText = d.temperature;
        document.getElementById('h').innerText = d.humidity;
        document.getElementById('m1').innerText = d.mq135;
        document.getElementById('m9').innerText = d.mq9;

        const now = new Date().toLocaleTimeString();
        if(chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); chart.data.datasets[1].data.shift(); }
        chart.data.labels.push(now);
        chart.data.datasets[0].data.push(d.mq135);
        chart.data.datasets[1].data.push(d.mq9);
        chart.update();
    });

    db.ref('last_seen').on('value', (s) => {
        const last = s.val();
        setInterval(() => {
            const isOnline = (Date.now() - last < 15000);
            const el = document.getElementById('stat');
            el.className = isOnline ? "status online" : "status offline";
            el.innerText = isOnline ? "TIZIM: ONLAYN" : "TIZIM: OFLAYN";
        }, 5000);
    });
</script>
</body>
</html>
